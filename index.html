<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>КіноВайб</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style>
  * { box-sizing: border-box; }
  body { background: #0f0f13; color: #e2e2e8; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 50; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .card { background: #1a1a24; border: 1px solid #2a2a38; border-radius: 16px; transition: transform 0.2s, box-shadow 0.2s; }
  .card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
  .btn-primary { background: linear-gradient(135deg, #7c3aed, #a855f7); color: #fff; border: none; border-radius: 10px; padding: 14px 28px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s, transform 0.1s; letter-spacing: 0.3px; }
  .btn-primary:hover { opacity: 0.9; transform: scale(1.02); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-secondary { background: transparent; color: #a78bfa; border: 1px solid #7c3aed; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.2s; text-decoration: none; display: inline-block; }
  .btn-secondary:hover { background: rgba(124,58,237,0.15); }
  .input-field { background: #12121a; border: 1px solid #2a2a38; border-radius: 10px; color: #e2e2e8; padding: 12px 14px; font-size: 15px; width: 100%; outline: none; transition: border-color 0.2s; }
  .input-field:focus { border-color: #7c3aed; }
  .input-field option { background: #1a1a24; }
  .spinner { width: 48px; height: 48px; border: 4px solid #2a2a38; border-top-color: #a855f7; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .poster-placeholder { background: linear-gradient(135deg, #1e1e2e, #2a1a3a); display: flex; align-items: center; justify-content: center; color: #555; font-size: 48px; }
  .rating-badge { background: rgba(234,179,8,0.15); color: #fbbf24; border: 1px solid rgba(234,179,8,0.3); border-radius: 6px; padding: 3px 8px; font-size: 13px; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; }
  .settings-btn { background: #1a1a24; border: 1px solid #2a2a38; border-radius: 10px; padding: 10px 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 15px; color: #e2e2e8; transition: background 0.2s; }
  .settings-btn:hover { background: #22222e; }
  .indicator { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .indicator.red { background: #ef4444; box-shadow: 0 0 8px #ef444466; }
  .indicator.green { background: #22c55e; box-shadow: 0 0 8px #22c55e66; }
  .modal-box { background: #1a1a24; border: 1px solid #2a2a38; border-radius: 20px; padding: 32px; width: 100%; max-width: 480px; }
  .search-box { background: #1a1a24; border: 1px solid #2a2a38; border-radius: 20px; padding: 32px; max-width: 680px; margin: 0 auto; }
  .link-small { color: #a78bfa; font-size: 12px; text-decoration: none; white-space: nowrap; }
  .link-small:hover { text-decoration: underline; }
  .genre-tag { background: rgba(124,58,237,0.15); color: #c084fc; border: 1px solid rgba(124,58,237,0.3); border-radius: 6px; padding: 2px 8px; font-size: 12px; }
  @media (max-width: 640px) { .modal-box { margin: 16px; padding: 24px; } .search-box { padding: 20px; } }
</style>
</head>
<body>

<!-- HEADER -->
<header style="background:#13131c; border-bottom:1px solid #1e1e2c; padding:16px 24px; position:sticky; top:0; z-index:40;">
  <div style="max-width:1200px; margin:0 auto; display:flex; align-items:center; justify-content:space-between;">
    <div style="display:flex; align-items:center; gap:12px;">
      <span style="font-size:28px; font-weight:800; background:linear-gradient(135deg,#a855f7,#ec4899); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; letter-spacing:-0.5px;">КіноВайб</span>
      <span style="color:#555; font-size:13px; margin-top:2px;">✦ AI підбір фільмів</span>
    </div>
    <button class="settings-btn" onclick="openSettings()">
      <span style="font-size:18px;">⚙</span>
      <span style="font-size:14px;">Налаштування</span>
      <div class="indicator red" id="statusIndicator"></div>
    </button>
  </div>
</header>

<!-- SETTINGS MODAL -->
<div class="modal-bg" id="settingsModal" style="display:none;" onclick="closeSettingsOnBg(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
      <h2 style="font-size:20px; font-weight:700; margin:0;">Налаштування API</h2>
      <button onclick="closeSettings()" style="background:none; border:none; color:#666; font-size:22px; cursor:pointer; line-height:1;">×</button>
    </div>

    <div style="margin-bottom:20px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
        <label style="font-size:14px; font-weight:500; color:#b0b0c0;">OMDb API Key</label>
        <a href="http://www.omdbapi.com/apikey.aspx" target="_blank" class="link-small">🔗 Отримати ключ</a>
      </div>
      <div style="position:relative;">
        <input class="input-field" type="password" id="omdbKeyInput" placeholder="Введіть OMDb ключ..." style="padding-right:44px;" />
        <button type="button" onclick="toggleVisibility('omdbKeyInput','eyeOmdb')" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#888;font-size:16px;padding:4px;" id="eyeOmdb">👁</button>
      </div>
    </div>

    <div style="margin-bottom:28px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
        <label style="font-size:14px; font-weight:500; color:#b0b0c0;">Gemini API Key</label>
        <a href="https://aistudio.google.com/app/apikey" target="_blank" class="link-small">🔗 Отримати ключ</a>
      </div>
      <div style="position:relative;">
        <input class="input-field" type="password" id="geminiKeyInput" placeholder="Введіть Gemini ключ..." style="padding-right:44px;" />
        <button type="button" onclick="toggleVisibility('geminiKeyInput','eyeGemini')" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#888;font-size:16px;padding:4px;" id="eyeGemini">👁</button>
      </div>
    </div>

    <button class="btn-primary" style="width:100%;" onclick="saveKeys()">💾 Зберегти</button>
    <p id="saveMsg" style="text-align:center; margin-top:12px; font-size:13px; color:#22c55e; display:none;">✓ Ключі збережено!</p>
  </div>
</div>

<!-- MAIN CONTENT -->
<main style="max-width:1200px; margin:0 auto; padding:40px 24px;">

  <!-- HERO -->
  <div style="text-align:center; margin-bottom:40px;">
    <h1 style="font-size:36px; font-weight:800; margin:0 0 12px; line-height:1.2;">
      Знайди ідеальний фільм<br>
      <span style="background:linear-gradient(135deg,#a855f7,#ec4899); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;">за допомогою AI</span>
    </h1>
    <p style="color:#888; font-size:16px; margin:0;">Опиши свій настрій — Gemini підбере, OMDb знайде</p>
  </div>

  <!-- SEARCH FORM -->
  <div class="search-box" style="margin-bottom:48px;">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px;">
      <div>
        <label style="font-size:13px; color:#888; display:block; margin-bottom:6px;">Рік випуску</label>
        <select class="input-field" id="yearSelect">
          <option value="">Будь-який рік</option>
          <script>
            for(let y=2026;y>=1960;y--) document.write(`<option value="${y}">${y}</option>`);
          </script>
        </select>
      </div>
      <div>
        <label style="font-size:13px; color:#888; display:block; margin-bottom:6px;">Жанр</label>
        <select class="input-field" id="genreSelect">
          <option value="">Будь-який жанр</option>
          <option value="Комедія">Комедія</option>
          <option value="Драма">Драма</option>
          <option value="Фантастика">Фантастика</option>
          <option value="Екшн">Екшн</option>
          <option value="Жахи">Жахи</option>
          <option value="Мелодрама">Мелодрама</option>
          <option value="Трилер">Трилер</option>
          <option value="Пригоди">Пригоди</option>
          <option value="Анімація">Анімація</option>
          <option value="Документальний">Документальний</option>
          <option value="Кримінал">Кримінал</option>
          <option value="Біографія">Біографія</option>
          <option value="Фентезі">Фентезі</option>
          <option value="Бойовик">Бойовик</option>
        </select>
      </div>
    </div>

    <div style="margin-bottom:20px;">
      <label style="font-size:13px; color:#888; display:block; margin-bottom:6px;">Ваші побажання <span style="color:#a855f7;">*</span></label>
      <textarea class="input-field" id="wishInput" rows="4" placeholder="Наприклад: атмосферне кіно про хакерів з несподіваним кінцем..." style="resize:vertical; min-height:100px;"></textarea>
    </div>

    <button class="btn-primary" style="width:100%; font-size:17px; padding:16px;" onclick="searchMovies()">
      🎬 Підібрати фільми
    </button>
    <p id="errorMsg" style="color:#f87171; font-size:14px; margin-top:12px; text-align:center; display:none;"></p>
  </div>

  <!-- SPINNER -->
  <div id="spinnerArea" style="display:none; text-align:center; padding:60px 0;">
    <div class="spinner" style="margin:0 auto 20px;"></div>
    <p style="color:#888;" id="spinnerText">Запитую Gemini AI...</p>
  </div>

  <!-- RESULTS -->
  <div id="resultsArea" style="display:none;">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:24px;">
      <h2 style="font-size:22px; font-weight:700; margin:0;" id="resultsTitle">Підібрані фільми</h2>
      <span id="resultsMeta" style="color:#888; font-size:14px;"></span>
    </div>
    <div id="moviesGrid" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:24px;"></div>
  </div>

</main>

<script>
function toggleVisibility(inputId, btnId) {
  const input = document.getElementById(inputId);
  const btn = document.getElementById(btnId);
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  btn.textContent = isHidden ? '🙈' : '👁';
}

const DEFAULT_OMDB = '397f5fe3';
const DEFAULT_GEMINI = 'AIzaSyBh3ZPHhGE_5qXwQUj7ttrfzEIpKwEFmT4';

function loadKeys() {
  return {
    omdb: localStorage.getItem('omdb_key') || DEFAULT_OMDB,
    gemini: localStorage.getItem('gemini_key') || DEFAULT_GEMINI
  };
}

function updateIndicator() {
  const keys = loadKeys();
  const el = document.getElementById('statusIndicator');
  const hasKeys = keys.omdb && keys.gemini;
  el.className = 'indicator ' + (hasKeys ? 'green' : 'red');
}

function openSettings() {
  const keys = loadKeys();
  document.getElementById('omdbKeyInput').value = keys.omdb || '';
  document.getElementById('geminiKeyInput').value = keys.gemini || '';
  document.getElementById('saveMsg').style.display = 'none';
  document.getElementById('settingsModal').style.display = 'flex';
}

function closeSettings() {
  document.getElementById('settingsModal').style.display = 'none';
}

function closeSettingsOnBg(e) {
  if (e.target === document.getElementById('settingsModal')) closeSettings();
}

function saveKeys() {
  const omdb = document.getElementById('omdbKeyInput').value.trim();
  const gemini = document.getElementById('geminiKeyInput').value.trim();
  if (omdb) localStorage.setItem('omdb_key', omdb);
  if (gemini) localStorage.setItem('gemini_key', gemini);
  document.getElementById('saveMsg').style.display = 'block';
  updateIndicator();
  setTimeout(closeSettings, 1200);
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}

function setSpinner(show, text='') {
  const el = document.getElementById('spinnerArea');
  el.style.display = show ? 'block' : 'none';
  if (text) document.getElementById('spinnerText').textContent = text;
}

function cleanJson(raw) {
  return raw.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
}

async function askGemini(prompt, geminiKey) {
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
  });
  if (!res.ok) throw new Error('Gemini API error: ' + res.status);
  const data = await res.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  return JSON.parse(cleanJson(text));
}

async function fetchOMDb(title, omdbKey) {
  const url = `https://www.omdbapi.com/?t=${encodeURIComponent(title)}&apikey=${omdbKey}`;
  const res = await fetch(url);
  const data = await res.json();
  if (data.Response === 'False') return null;
  return data;
}

function renderCard(movie) {
  const posterUrl = movie.Poster && movie.Poster !== 'N/A' ? movie.Poster : null;
  const rating = movie.imdbRating && movie.imdbRating !== 'N/A' ? movie.imdbRating : '—';
  const year = movie.Year || '—';
  const imdbLink = `https://www.imdb.com/title/${movie.imdbID}/`;
  const tmdbLink = `https://www.themoviedb.org/search?query=${encodeURIComponent(movie.Title)}`;

  return `
  <div class="card" style="overflow:hidden; display:flex; flex-direction:column;">
    <div style="height:320px; overflow:hidden; position:relative;">
      ${posterUrl
        ? `<img src="${posterUrl}" alt="${movie.Title}" style="width:100%; height:100%; object-fit:cover;" loading="lazy" />`
        : `<div class="poster-placeholder" style="width:100%; height:100%;">🎬</div>`
      }
      <div style="position:absolute; top:10px; right:10px;" class="rating-badge">⭐ ${rating}</div>
    </div>
    <div style="padding:18px; flex:1; display:flex; flex-direction:column;">
      <h3 style="font-size:16px; font-weight:700; margin:0 0 4px; color:#f0f0f8; line-height:1.3;">${movie.Title}</h3>
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:12px; flex-wrap:wrap;">
        <span style="color:#888; font-size:13px;">${year}</span>
        ${movie.Genre ? `<span class="genre-tag">${movie.Genre.split(',')[0].trim()}</span>` : ''}
      </div>
      <p style="font-size:13px; color:#a0a0b0; line-height:1.6; margin:0 0 16px; flex:1;">${movie.aiPlot || ''}</p>
      <div style="display:flex; flex-direction:column; gap:8px; margin-top:auto;">
        <a href="${imdbLink}" target="_blank" class="btn-secondary" style="text-align:center;">🎥 Детальніше на IMDb</a>
        <a href="${tmdbLink}" target="_blank" class="btn-secondary" style="text-align:center; color:#c084fc; border-color:#a855f7;">🔍 Шукати опис українською</a>
      </div>
    </div>
  </div>`;
}

async function searchMovies() {
  hideError();
  const keys = loadKeys();
  const wish = document.getElementById('wishInput').value.trim();
  const year = document.getElementById('yearSelect').value;
  const genre = document.getElementById('genreSelect').value;

  if (!wish) { showError('⚠ Будь ласка, введіть ваші побажання.'); return; }
  if (!keys.omdb || !keys.gemini) { showError('⚠ Спочатку вкажіть API ключі в Налаштуваннях.'); return; }

  document.getElementById('resultsArea').style.display = 'none';
  document.getElementById('moviesGrid').innerHTML = '';
  setSpinner(true, 'Запитую Gemini AI...');

  let yearPart = year ? `Рік: ${year}.` : '';
  let genrePart = genre ? `Жанр: ${genre}.` : '';
  const prompt = `Підбери 16 фільмів, які ідеально відповідають цим критеріям користувача (врахуй рік і жанр, якщо вказані). ${yearPart} ${genrePart} Побажання: ${wish}. Поверни СУТО JSON масив об'єктів. Кожен об'єкт має містити два ключі: 'title' (точна офіційна англійська назва для пошуку в базі) та 'plot' (цікавий і детальний опис фільму УКРАЇНСЬКОЮ мовою). Приклад: [{"title": "The Matrix", "plot": "Культовий фільм про хакера Нео..."}].`;

  let geminiMovies;
  try {
    geminiMovies = await askGemini(prompt, keys.gemini);
  } catch(e) {
    setSpinner(false);
    showError('❌ Помилка Gemini API. Перевірте ключ або спробуйте ще раз.');
    return;
  }

  setSpinner(true, `Шукаю дані по ${geminiMovies.length} фільмах...`);

  const results = [];
  for (const item of geminiMovies) {
    try {
      const omdb = await fetchOMDb(item.title, keys.omdb);
      if (!omdb) continue;
      omdb.aiPlot = item.plot;
      results.push(omdb);
    } catch(e) { /* skip */ }
  }

  results.sort((a, b) => {
    const ra = parseFloat(a.imdbRating) || 0;
    const rb = parseFloat(b.imdbRating) || 0;
    return rb - ra;
  });

  setSpinner(false);

  if (results.length === 0) {
    showError('😕 Не вдалося знайти фільми. Спробуйте змінити побажання.');
    return;
  }

  document.getElementById('resultsTitle').textContent = 'Підібрані фільми';
  document.getElementById('resultsMeta').textContent = `Знайдено: ${results.length} фільмів`;
  document.getElementById('moviesGrid').innerHTML = results.map(renderCard).join('');
  document.getElementById('resultsArea').style.display = 'block';
  document.getElementById('resultsArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Init
updateIndicator();
</script>
</body>
</html>
