<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КіноВайб — Твій ШІ-кіногід</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .loader {
            border: 4px solid #1e293b;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen">

    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent">КіноВайб</h1>
            <div class="flex items-center gap-4">
                <div id="status-indicator" class="flex items-center gap-2 text-sm font-medium">
                    <span id="status-dot" class="w-3 h-3 rounded-full bg-red-500"></span>
                    <span id="status-text">Оновлення...</span>
                </div>
                <button onclick="toggleModal()" class="p-2 hover:bg-slate-800 rounded-full transition-colors text-xl">⚙️</button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-12">
        <div class="bg-slate-800/50 p-8 rounded-3xl border border-slate-700 shadow-xl">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-medium mb-2 text-slate-400">Рік виходу</label>
                    <select id="year-select" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">Будь-який рік</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2 text-slate-400">Жанр</label>
                    <select id="genre-select" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">Будь-який жанр</option>
                        <option>Комедія</option><option>Драма</option><option>Фантастика</option><option>Екшн</option>
                        <option>Жахи</option><option>Трилер</option><option>Детектив</option><option>Мультфільм</option>
                    </select>
                </div>
            </div>

            <div class="mb-8">
                <label class="block text-sm font-medium mb-2 text-slate-400">Ваші побажання *</label>
                <textarea id="wishes-input" placeholder="Наприклад: фільм про хакерів у неоновому місті..." class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 h-32 outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
            </div>

            <button onclick="findMovies()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">Підібрати фільми</button>
        </div>

        <div id="loading-area" class="hidden flex flex-col items-center justify-center mt-20">
            <div class="loader mb-4"></div>
            <p class="text-slate-400 animate-pulse">Gemini аналізує ваші вподобання...</p>
        </div>

        <div id="results-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mt-16"></div>
    </main>

    <div id="settings-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
        <div class="bg-slate-800 border border-slate-700 w-full max-w-md rounded-3xl p-8 shadow-2xl">
            <h2 class="text-2xl font-bold mb-6">Налаштування API</h2>
            <div class="space-y-6">
                <div>
                    <label class="text-sm text-slate-400">OMDb API Key</label>
                    <input type="password" id="omdb-key" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 outline-none">
                </div>
                <div>
                    <label class="text-sm text-slate-400">Gemini API Key</label>
                    <input type="password" id="gemini-key" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 outline-none">
                </div>
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="saveKeys()" class="flex-1 bg-blue-600 py-3 rounded-xl font-semibold">Зберегти</button>
                <button onclick="toggleModal()" class="flex-1 bg-slate-700 py-3 rounded-xl font-semibold">Закрити</button>
            </div>
        </div>
    </div>

    <script>
        // ВСТАВЛЕНІ КЛЮЧІ
        const KEY_OMDB = "397f5fe3";
        const KEY_GEMINI = "AIzaSyBh3ZPHhGE_5qXwQUj7ttrfzEIpKwEFmT4";

        const yearSelect = document.getElementById('year-select');
        const resultsGrid = document.getElementById('results-grid');
        const loader = document.getElementById('loading-area');

        for (let year = 2026; year >= 1970; year--) {
            const opt = document.createElement('option');
            opt.value = year; opt.textContent = year;
            yearSelect.appendChild(opt);
        }

        window.onload = () => {
            localStorage.setItem('omdb_key', KEY_OMDB);
            localStorage.setItem('gemini_key', KEY_GEMINI);
            document.getElementById('omdb-key').value = KEY_OMDB;
            document.getElementById('gemini-key').value = KEY_GEMINI;
            updateStatus();
        };

        function toggleModal() { document.getElementById('settings-modal').classList.toggle('hidden'); }
        
        function saveKeys() {
            localStorage.setItem('omdb_key', document.getElementById('omdb-key').value.trim());
            localStorage.setItem('gemini_key', document.getElementById('gemini-key').value.trim());
            updateStatus(); toggleModal();
        }

        function updateStatus() {
            const ok = localStorage.getItem('omdb_key') && localStorage.getItem('gemini_key');
            document.getElementById('status-dot').className = `w-3 h-3 rounded-full ${ok ? 'bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]' : 'bg-red-500'}`;
            document.getElementById('status-text').textContent = ok ? "Ключі підключено" : "Ключі не налаштовані";
        }

        async function findMovies() {
            const omdbKey = localStorage.getItem('omdb_key');
            const geminiKey = localStorage.getItem('gemini_key');
            const wishes = document.getElementById('wishes-input').value.trim();
            if (!wishes) return alert("Будь ласка, напишіть побажання!");

            resultsGrid.innerHTML = '';
            loader.classList.remove('hidden');

            try {
                const prompt = `Порекомендуй 8 фільмів (рік: ${document.getElementById('year-select').value || 'будь-який'}, жанр: ${document.getElementById('genre-select').value || 'будь-який'}, побажання: ${wishes}). Поверни СУТО JSON масив об'єктів: [{"title": "English Title", "plot": "Опис українською"}]`;
                
                // ВИПРАВЛЕНО: МОДЕЛЬ 1.5 (2.5 НЕ ІСНУЄ)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;
                const movies = JSON.parse(text.replace(/```json|```/g, '').trim());

                const movieDetails = await Promise.all(movies.map(async m => {
                    const res = await fetch(`https://www.omdbapi.com/?apikey=${omdbKey}&t=${encodeURIComponent(m.title)}`);
                    const d = await res.json();
                    return d.Response === "True" ? { ...d, uPlot: m.plot } : null;
                }));

                renderCards(movieDetails.filter(m => m));
            } catch (e) {
                console.error(e);
                alert("Помилка запиту. Спробуйте ще раз через хвилину.");
            } finally {
                loader.classList.add('hidden');
            }
        }

        function renderCards(movies)
